<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerCycle - Offline Menstrual Health Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fffafb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section {
            background: linear-gradient(135deg, #d81b60 0%, #8e24aa 100%);
            color: white;
            padding: 100px 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .btn-custom { background-color: #fff; color: #d81b60; font-weight: bold; border-radius: 30px; padding: 10px 30px; }
        .btn-custom:hover { background-color: #f8f9fa; color: #ad1457; }
        .nav-tabs .nav-link { color: #495057; }
        .nav-tabs .nav-link.active { font-weight: bold; color: #d81b60; border-bottom: 3px solid #d81b60; }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <div class="container">
        <h1 class="display-3 fw-bold mb-4">HerCycle</h1>
        <p class="lead mb-5 mx-auto" style="max-width: 600px;">
            Empowering adolescent girls with offline-first menstrual health and anemia risk tracking. 
            Built for Community Health Volunteers to monitor, support, and care.
        </p>
        <button class="btn btn-custom btn-lg shadow" data-bs-toggle="modal" data-bs-target="#authModal">
            Access Portal
        </button>
    </div>
</div>

<div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            
            <div class="modal-header border-0 pb-0">
                <ul class="nav nav-tabs w-100" id="authTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active border-0 bg-transparent" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link border-0 bg-transparent" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
                    </li>
                </ul>
                <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-4">
                <div class="tab-content" id="authTabsContent">
                    
                    <div class="tab-pane fade show active" id="login" role="tabpanel">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label text-muted small text-uppercase">Username</label>
                                <input type="text" id="loginUsername" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small text-uppercase">Password</label>
                                <input type="password" id="loginPassword" class="form-control" required>
                            </div>
                            <div id="loginAlert" class="alert d-none py-2 small"></div>
                            <button type="submit" class="btn btn-primary w-100" style="background-color: #d81b60; border: none;">Login to Dashboard</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="register" role="tabpanel">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label text-muted small text-uppercase">Username</label>
                                <input type="text" id="regUsername" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small text-uppercase">Organization/Region</label>
                                <input type="text" id="regOrg" class="form-control" placeholder="e.g., Red Cross Nairobi">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small text-uppercase">Password</label>
                                <input type="password" id="regPassword" class="form-control" required>
                            </div>
                            <div id="regAlert" class="alert d-none py-2 small"></div>
                            <button type="submit" class="btn btn-primary w-100" style="background-color: #d81b60; border: none;">Submit Application</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    const csrftoken = getCookie('csrftoken');

    // Handle Login
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const alertDiv = document.getElementById('loginAlert');
        const submitBtn = this.querySelector('button[type="submit"]');
        
        submitBtn.disabled = true;
        submitBtn.innerText = "Authenticating...";
        alertDiv.classList.add('d-none');

        fetch('/auth/chv/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
            body: JSON.stringify({
                username: document.getElementById('loginUsername').value,
                password: document.getElementById('loginPassword').value
            })
        })
        .then(async response => {
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Login failed.");
            
            // SECURITY: Use the redirect path provided by the server
            // This handles Admin vs CHV routing automatically
            window.location.href = data.redirect || '/dashboard/'; 
        })
        .catch(err => {
            alertDiv.className = 'alert alert-danger py-2 small'; 
            alertDiv.innerText = err.message;
            alertDiv.classList.remove('d-none');
            submitBtn.disabled = false;
            submitBtn.innerText = "Login to Dashboard";
        });
    });

    // Handle Registration
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const alertDiv = document.getElementById('regAlert');
        const submitBtn = this.querySelector('button[type="submit"]');
        
        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting...";
        alertDiv.classList.add('d-none');

        fetch('/auth/chv/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
            body: JSON.stringify({
                username: document.getElementById('regUsername').value,
                organization: document.getElementById('regOrg').value,
                password: document.getElementById('regPassword').value
            })
        })
        .then(async response => {
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Registration failed.");
            
            document.getElementById('registerForm').reset();
            const loginTab = new bootstrap.Tab(document.querySelector('#login-tab'));
            loginTab.show();
            
            document.getElementById('loginUsername').value = document.getElementById('regUsername').value;
            const loginAlert = document.getElementById('loginAlert');
            loginAlert.className = 'alert alert-success py-2 small';
            loginAlert.innerText = data.message; 
            loginAlert.classList.remove('d-none');
            
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Application";
        })
        .catch(err => {
            alertDiv.className = 'alert alert-danger py-2 small';
            alertDiv.innerText = err.message;
            alertDiv.classList.remove('d-none');
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Application";
        });
    });
</script>

</body>
</html>
