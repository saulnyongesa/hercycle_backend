<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HemaCycle - Offline Menstrual Health Tracking</title>
    <link rel="icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fffafb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section {
            background: linear-gradient(135deg, #d81b60 0%, #8e24aa 100%);
            color: white;
            padding: 100px 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .btn-custom { background-color: #fff; color: #d81b60; font-weight: bold; border-radius: 30px; padding: 10px 30px; transition: 0.3s; }
        .btn-custom:hover { background-color: #f8f9fa; color: #ad1457; transform: scale(1.05); }
        .nav-tabs .nav-link { color: #495057; border: none; }
        .nav-tabs .nav-link.active { font-weight: bold; color: #d81b60; border-bottom: 3px solid #d81b60; background: none; }
        .modal-content { border-radius: 15px; }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <div class="container">
        <h1 class="display-3 fw-bold mb-4">HemaCycle</h1>
        <p class="lead mb-5 mx-auto" style="max-width: 600px;">
            Empowering adolescent girls with offline-first menstrual health and anemia risk tracking. 
            Built for Community Health Volunteers to monitor, support, and care.
        </p>
        <button class="btn btn-custom btn-lg shadow" data-bs-toggle="modal" data-bs-target="#authModal">
            Access Portal
        </button>
    </div>
</div>

<div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header border-0 pb-0">
                <ul class="nav nav-tabs w-100" id="authTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab">Login</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button" role="tab">Register</button>
                    </li>
                </ul>
                <button type="button" class="btn-close m-3" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-4">
                <div class="tab-content">
                    
                    <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label text-muted small text-uppercase fw-bold">Username</label>
                                <input type="text" id="loginUsername" class="form-control bg-light" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small text-uppercase fw-bold">Password</label>
                                <input type="password" id="loginPassword" class="form-control bg-light" required>
                            </div>
                            <div id="loginAlert" class="alert d-none py-2 small"></div>
                            <button type="submit" id="loginBtn" class="btn btn-primary w-100 fw-bold" style="background-color: #d81b60; border: none; padding: 12px;">Login to Dashboard</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="register-pane" role="tabpanel">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label text-muted small text-uppercase fw-bold">Full Name / Username</label>
                                <input type="text" id="regUsername" class="form-control bg-light" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small text-uppercase fw-bold">Organization / Region</label>
                                <input type="text" id="regOrg" class="form-control bg-light" placeholder="e.g. Red Cross Kisumu" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted small text-uppercase fw-bold">Create Password</label>
                                <input type="password" id="regPassword" class="form-control bg-light" required>
                            </div>
                            <div id="regAlert" class="alert d-none py-2 small"></div>
                            <button type="submit" id="regBtn" class="btn btn-primary w-100 fw-bold" style="background-color: #d81b60; border: none; padding: 12px;">Submit Application</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // --- Helper: Get CSRF Token ---
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // --- Core: API Request Wrapper ---
    // This helps catch HTML responses and provides better error messages
    async function apiRequest(url, body) {
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify(body)
        });

        const contentType = response.headers.get("content-type");
        
        // If the server didn't return JSON, it likely returned a 404 or 500 HTML page
        if (!contentType || !contentType.includes("application/json")) {
            const htmlError = await response.text();
            console.error("Server Error (HTML returned):", htmlError);
            throw new Error(`Server returned HTML instead of JSON. Check your Django URL routing and terminal logs.`);
        }

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Request failed.");
        return data;
    }

    // --- Event: Handle Login ---
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const alertDiv = document.getElementById('loginAlert');
        const btn = document.getElementById('loginBtn');
        
        btn.disabled = true;
        btn.innerText = "Checking Credentials...";
        alertDiv.classList.add('d-none');

        try {
            const data = await apiRequest('/auth/chv/login/', {
                username: document.getElementById('loginUsername').value,
                password: document.getElementById('loginPassword').value
            });
            
            // Redirect based on the path provided by our multi-role logic in views.py
            window.location.href = data.redirect || '/dashboard/';
        } catch (err) {
            alertDiv.className = 'alert alert-danger py-2 small';
            alertDiv.innerText = err.message;
            alertDiv.classList.remove('d-none');
            btn.disabled = false;
            btn.innerText = "Login to Dashboard";
        }
    });

    // --- Event: Handle Registration ---
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const alertDiv = document.getElementById('regAlert');
        const btn = document.getElementById('regBtn');
        
        btn.disabled = true;
        btn.innerText = "Sending Application...";
        alertDiv.classList.add('d-none');

        try {
            const data = await apiRequest('/auth/chv/register/', {
                username: document.getElementById('regUsername').value,
                organization: document.getElementById('regOrg').value,
                password: document.getElementById('regPassword').value
            });

            // Switch to login tab on success
            document.getElementById('registerForm').reset();
            const loginTab = new bootstrap.Tab(document.querySelector('#login-tab'));
            loginTab.show();

            const loginAlert = document.getElementById('loginAlert');
            loginAlert.className = 'alert alert-success py-2 small';
            loginAlert.innerText = data.message || "Registration successful! Please login.";
            loginAlert.classList.remove('d-none');
            document.getElementById('loginUsername').value = document.getElementById('regUsername').value;

        } catch (err) {
            alertDiv.className = 'alert alert-danger py-2 small';
            alertDiv.innerText = err.message;
            alertDiv.classList.remove('d-none');
        } finally {
            btn.disabled = false;
            btn.innerText = "Submit Application";
        }
    });
</script>

</body>
</html>
